# This rule is not used by the project dp-scaffold itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over dataprepper.kaasops.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dp-scaffold
    app.kubernetes.io/managed-by: kustomize
  name: datapreppersourcediscovery-admin-role
rules:
- apiGroups:
  - dataprepper.kaasops.io
  resources:
  - datapreppersourcediscoveries
  verbs:
  - '*'
- apiGroups:
  - dataprepper.kaasops.io
  resources:
  - datapreppersourcediscoveries/status
  verbs:
  - get
