# This rule is not used by the project dp-scaffold itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the dataprepper.kaasops.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dp-scaffold
    app.kubernetes.io/managed-by: kustomize
  name: dataprepperdefaults-editor-role
rules:
- apiGroups:
  - dataprepper.kaasops.io
  resources:
  - dataprepperdefaults
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dataprepper.kaasops.io
  resources:
  - dataprepperdefaults/status
  verbs:
  - get
