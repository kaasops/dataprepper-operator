name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --no-config --enable revive,goconst,prealloc,staticcheck,unparam,gocyclo

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: make vulncheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  build:
    name: Build
    needs: [lint, test, govulncheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build
      - run: make docker-build IMG=dataprepper-operator:ci

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dataprepper-operator:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Build operator image
        run: make docker-build IMG=controller:latest

      - name: Run e2e tests
        run: make test-e2e-full

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-reports
          path: test/e2e/reports/
          retention-days: 14

  push-dev:
    name: Push Dev Image and Chart
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine dev version
        id: version
        run: echo "dev=0.0.0-dev+sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set chart version
        run: |
          VERSION="${{ steps.version.outputs.dev }}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/chart/Chart.yaml

      - name: Package and push chart
        run: |
          helm package deploy/chart --destination .cr-release-packages
          helm push .cr-release-packages/*.tgz oci://ghcr.io/kaasops/charts
