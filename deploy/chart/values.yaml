## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: ghcr.io/kaasops/dataprepper-operator
    # tag defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Environment variables
  ##
  env: []

  ## Env overrides (--set manager.envOverrides.VAR=value)
  ## Same name in env above: this value takes precedence.
  ##
  envOverrides: {}

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## PodDisruptionBudget for the operator
  ##
  podDisruptionBudget:
    enable: false
    minAvailable: 1

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: false

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8443

## Webhook configuration.
## The operator registers a validating webhook for DataPrepperPipeline resources.
## TLS certificates must be provided for the webhook server.
##
webhook:
  # Enable webhook and related resources (Service, ValidatingWebhookConfiguration).
  enable: false
  # Use a pre-existing TLS Secret for webhook certs.
  # The Secret must contain tls.crt and tls.key.
  certSecret: ""

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

## Grafana dashboard provisioning.
## Creates a ConfigMap picked up by the Grafana sidecar.
##
grafana:
  dashboard:
    enable: false
    # Label applied to the ConfigMap so the Grafana sidecar discovers it.
    sidecarLabel:
      grafana_dashboard: "1"

